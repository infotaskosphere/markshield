services:
  # ── Frontend (React/Vite — Static Site) ────────────────────────────────────
  - type: web
    name: frontend-markshield
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Backend (Python/Flask) ──────────────────────────────────────────────────
  - type: web
    name: backend-markshield
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── Nightly Sync Scheduler (background worker) ─────────────────────────────
  - type: worker
    name: markshield-scheduler
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: python sync_scheduler.py
    envVars:
      - key: SECRET_KEY
        fromService:
          type: web
          name: backend-markshield
          envVarKey: SECRET_KEY
      - key: SYNC_TMA_CODES
        value: ""
      - key: PYTHON_VERSION
        value: 3.11.0
